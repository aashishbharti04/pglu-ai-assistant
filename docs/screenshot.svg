<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="JetBrains Mono, Consolas, monospace">
  <rect width="820" height="520" rx="14" fill="#0b0f17"/>
  <!-- window bar -->
  <rect width="820" height="40" rx="14" fill="#131925"/>
  <rect y="20" width="820" height="20" fill="#131925"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/><circle cx="46" cy="20" r="6" fill="#ffbd2e"/><circle cx="68" cy="20" r="6" fill="#27c93f"/>
  <text x="410" y="25" fill="#7d8ca6" font-size="12.5" text-anchor="middle" font-family="Inter, sans-serif">pglu — AI Assistant</text>

  <g font-size="13.5">
    <text x="24" y="72" fill="#22d3ee">$ pglu</text>
    <text x="24" y="94" fill="#a8b3c7">🤖 Pglu AI Assistant is online. Type a command — or 'help', 'exit'.</text>

    <text x="24" y="124" fill="#7d8ca6">You: </text><text x="64" y="124" fill="#e8edf5">what is 24 times 7</text>
    <text x="24" y="146" fill="#8b5cf6">Pglu: </text><text x="70" y="146" fill="#c9d3de">That's 168.</text>

    <text x="24" y="176" fill="#7d8ca6">You: </text><text x="64" y="176" fill="#e8edf5">who is Alan Turing</text>
    <text x="24" y="198" fill="#8b5cf6">Pglu: </text><text x="70" y="198" fill="#c9d3de">Alan Turing was an English mathematician and computer scientist,</text>
    <text x="70" y="216" fill="#c9d3de">widely considered the father of theoretical computer science.</text>

    <text x="24" y="246" fill="#7d8ca6">You: </text><text x="64" y="246" fill="#e8edf5">weather in Mumbai</text>
    <text x="24" y="268" fill="#8b5cf6">Pglu: </text><text x="70" y="268" fill="#c9d3de">It's 31°C with partly cloudy in Mumbai, India. Wind around 14 km/h.</text>

    <text x="24" y="298" fill="#7d8ca6">You: </text><text x="64" y="298" fill="#e8edf5">open notepad</text>
    <text x="24" y="320" fill="#8b5cf6">Pglu: </text><text x="70" y="320" fill="#c9d3de">Opening notepad.</text>

    <text x="24" y="350" fill="#7d8ca6">You: </text><text x="64" y="350" fill="#e8edf5">battery</text>
    <text x="24" y="372" fill="#8b5cf6">Pglu: </text><text x="70" y="372" fill="#c9d3de">Battery is at 82% (charging).</text>

    <text x="24" y="402" fill="#7d8ca6">You: </text><text x="64" y="402" fill="#e8edf5">generate a password 16</text>
    <text x="24" y="424" fill="#8b5cf6">Pglu: </text><text x="70" y="424" fill="#22c55e">🔐 s76Gffh-FLWOmAx9</text>

    <text x="24" y="454" fill="#7d8ca6">You: </text><text x="64" y="454" fill="#e8edf5">set a timer for 5 minutes to take a break</text>
    <text x="24" y="476" fill="#8b5cf6">Pglu: </text><text x="70" y="476" fill="#c9d3de">Okay — I'll remind you in 5 minutes to take a break.</text>

    <text x="24" y="500" fill="#22d3ee">You: <tspan fill="#e8edf5">▍</tspan></text>
  </g>
</svg>
