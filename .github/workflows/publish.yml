name: Publish to PyPI

# Manual-only: run from the Actions tab when you're ready to release.
on:
  workflow_dispatch: {}

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi          # configure a "pypi" environment + trusted publisher on PyPI
    permissions:
      id-token: write          # OIDC for PyPI Trusted Publishing (no API token needed)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
